<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criando um menu horizontal</title>
  <style>
    .header 
    {
      width: 100%;
      height: 50px;
      background-color: rgb(107, 0, 0);
      color: rgb(255, 255, 255);
      font-size: 30px;

    }
    li
    {
      padding:10px;
      display: inline;
    }

  </style>
</head>
<body>
  <div class="header">
    <ul>
      <li>Cadastrar</li>
      <li>Alterar</li>
      <li>Consultar</li>
      <li>Excluir</li>
      <li>Sobre</li>
      <li>Ajuda</li>
    </ul>
  </div>
</body>
</html>
